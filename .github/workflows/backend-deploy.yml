name: Backend — Deploy

on:
  workflow_run:
    workflows: ["Backend — Build"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read

    env:
      SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Build and push via Cloud Build
        run: |
          gcloud builds submit backend \
            --tag="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.AR_REPO }}/api:${{ env.SHA }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.CLOUD_RUN_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.AR_REPO }}/api:${{ env.SHA }}
