name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: music_separation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FLASK_ENV: testing
      ENABLE_MOCK_RESPONSES: "true"
      JWT_SECRET: ci-test-secret
      WORKER_SECRET: ci-worker-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/music_separation_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov flake8

      - name: Lint (flake8)
        run: |
          flake8 . \
            --exclude=__pycache__,.venv \
            --max-line-length=120 \
            --ignore=E501,W503

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            backend/htmlcov/
            backend/coverage.xml

  ui:
    name: UI — Type Check, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:coverage -- --passWithNoTests

      - name: Build web (expo export)
        run: npx expo export --platform web --output-dir dist/web

      - name: Build Android bundle (expo export)
        run: npx expo export --platform android --output-dir dist/android

      - name: Build iOS bundle (expo export)
        run: npx expo export --platform ios --output-dir dist/ios

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-coverage
          path: |
            ui/coverage/lcov-report/
            ui/coverage/lcov.info

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-builds
          path: |
            ui/dist/web/
            ui/dist/android/
            ui/dist/ios/

  deploy:
    name: Deploy — Cloud Run
    runs-on: ubuntu-latest
    needs: [backend, ui]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Required GitHub secrets:
    #   GCP_PROJECT_ID               — your GCP project ID
    #   GCP_REGION                   — e.g. us-central1
    #   GCP_WORKLOAD_IDENTITY_PROVIDER — full WIF provider resource name
    #   GCP_SERVICE_ACCOUNT          — deployer SA email
    #   CLOUD_RUN_SERVICE            — Cloud Run service name, e.g. aurafractor-api
    #   AR_REPO                      — Artifact Registry repo, e.g. aurafractor
    #
    # One-time GCP setup (run locally):
    #   gcloud artifacts repositories create aurafractor --repository-format=docker --location=$REGION
    #   gcloud iam workload-identity-pools create github --location=global
    #   gcloud iam workload-identity-pools providers create-oidc github \
    #     --location=global --workload-identity-pool=github \
    #     --issuer-uri=https://token.actions.githubusercontent.com \
    #     --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository"
    #   gcloud iam service-accounts add-iam-policy-binding $SA \
    #     --role=roles/iam.workloadIdentityUser \
    #     --member="principalSet://iam.googleapis.com/.../attribute.repository/YOUR_ORG/YOUR_REPO"

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker (Artifact Registry auth)
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.AR_REPO }}/api
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f backend/Dockerfile backend
          docker push --all-tags $IMAGE

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.CLOUD_RUN_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.AR_REPO }}/api:${{ github.sha }}
