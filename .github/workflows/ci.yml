name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: music_separation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FLASK_ENV: testing
      ENABLE_MOCK_RESPONSES: "true"
      JWT_SECRET: ci-test-secret
      WORKER_SECRET: ci-worker-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/music_separation_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov flake8

      - name: Lint (flake8)
        run: |
          flake8 . \
            --exclude=__pycache__,.venv \
            --max-line-length=120 \
            --ignore=E501,W503

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/htmlcov/
