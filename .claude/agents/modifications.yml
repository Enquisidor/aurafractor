  - type: project_rule
    agents: [backend]
    description: "Aurafractor backend conventions — database access, route decorators, logging, validation"
    content: |
      All database access goes through database/models/ + database/connection.py.
      Use execute_query and db_transaction — never write raw SQL in routes or service code.

      Route handlers use decorators exclusively: @require_auth for user-facing routes,
      @worker_auth for worker callbacks, @handle_errors for error normalisation.
      Never inline JWT checks or bare try/except in route handlers.

      All logging via utils/logging.py (structured JSON, GCP-compatible).
      Never use print() or Python's stdlib logging module directly in application code.

      All input validation via utils/validation.py (raises ValueError).
      Never inline validation logic in routes or services.

  - type: project_rule
    agents: [frontend]
    description: "Aurafractor frontend conventions — API client, storage abstraction, polling pattern"
    content: |
      All API calls through src/api/client.ts — no raw fetch() in components or hooks.

      Tokens and credentials accessed only through src/storage/platform.ts.
      Never call expo-secure-store or localStorage directly from components.

      Follow the useExtractionPoll hook pattern for extraction status polling:
      setInterval inside useEffect with a cleanup function.
      Clear the interval on unmount and when a terminal state (completed | failed) is reached.
