# Aurafractor — .agents/config.yml
# Generated by the app-dev-agents configurator.

library_path: /Users/alexweinstein/Documents/Code/skyfly/app-dev-agents

output_dir: assembled

orchestrator: true

# ---------------------------------------------------------------------------
# Feature pipeline agents
# ---------------------------------------------------------------------------

feature_agents:

  po:
    enabled: true
    modules:
      evaluation:
        enabled: true

  architect:
    enabled: true
    modules:
      design-accuracy:
        enabled: true
        dimensions: [architectural]
      evaluation:
        enabled: true

  qa:
    enabled: true
    modules:
      evaluation:
        enabled: true

  test:
    enabled: true
    modules:
      evaluation:
        enabled: true

  backend:
    enabled: true
    stacks:
      - sql-relational
    modules:
      security:
        enabled: true
      performance:
        enabled: true
      design-accuracy:
        enabled: true
        dimensions: [architectural]
      evaluation:
        enabled: true

  frontend:
    enabled: true
    stacks:
      - react-native
    modules:
      security:
        enabled: true
      accessibility:
        enabled: true
      performance:
        enabled: true
      design-accuracy:
        enabled: true
        dimensions: [architectural]   # no Figma refs — architectural only
      evaluation:
        enabled: true

  devops:
    enabled: true
    stacks:
      - terraform
    modules:
      security:
        enabled: true
      performance:
        enabled: true
      evaluation:
        enabled: true

# ---------------------------------------------------------------------------
# Review pipeline agents
# ---------------------------------------------------------------------------

review_agents:
  security: true
  code-quality: true
  accessibility: true
  architectural-consistency: true
  cicd: true
  document-consistency: true
  po-signoff: true

# ---------------------------------------------------------------------------
# Context budget settings
# ---------------------------------------------------------------------------

context:
  task_sizes:
    typical: medium
    split_threshold: large

# ---------------------------------------------------------------------------
# Project settings
# ---------------------------------------------------------------------------

settings:
  auto_fix_permitted: false
  wcag_target: AA
  default_design_accuracy_dimensions: [architectural]
